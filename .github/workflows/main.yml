
name: ci-workflow
on: 
  pull_request:
    branches:
    - master
    types: [assigned, opened, synchronize, reopened, ready_for_review]
  push:
    branches:
    - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        token: ${{ secrets.SH_CI_TOKEN }}
    - uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: AnirudhNarsipur
        password: ${{ secrets.ANIRUDH_CI_TOKEN }}
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ghcr.io/binpash/shseer:latest
