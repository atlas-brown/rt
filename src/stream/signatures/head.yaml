command_name: head
default_input_type: .*
default_output_type: .*
args:
- name: file
  type: .+
flags: []
rules:
- condition: {}
  update:
    output_type: '{{actual_input_type}}'
- condition:
    args:
    - file
  update:
    output_type: '{{file.content}}'
- condition:
    args:
    - file
    heuristics:
    - no_ignored_input
  update:
    input_type: ''
isInteresting: true
