command_name: ls
default_input_type: .*
default_output_type: '[^[:blank:]]+|''.+''|".+"'
args: []
flags: []
rules:
- condition:
    heuristics:
    - no_ignored_input
  update:
    input_type: ''
- condition:
    flags:
    - -l
  update:
    output_type: (total [0-9]+)|([drwxr-]+ +[0-9]+ +[^ ]+ +[^ ]+ +[0-9]+ +[^ ]+ +[0-9]+
      +[a-zA-Z]+ + [0-9]+ + [0-9:]+ +[^[:blank:]]+|'.+'|".+")
isInteresting: true
