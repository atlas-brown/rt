command_name: sort
default_input_type: .*
default_output_type: .*
args: []
flags: []
rules:
- condition:
    no_flags:
    - -n
    - -h
    heuristics:
    - no_sort_non_numeric_with_numeric_input
  update:
    no_input_type: "[[:blank:]]*[-+]?[0-9]+([[:blank:]].*)?"
- condition:
    flags:
    - -n
  update:
    input_type: "[[:blank:]]*[-+]?[0-9]+.*"
    output_type: '{{actual_input_type}}'
- condition:
    flags:
    - -h
  update:
    input_type: "[[:blank:]]*[-+]?[0-9]+.*"
    output_type: '{{actual_input_type}}'
- condition: {}
  update:
    output_type: '{{actual_input_type}}'
isInteresting: true
