command_name: ps
default_input_type: .*
default_output_type: (( )+PID( )+TTY( )+TIME( )+CMD)|(( )*[0-9]+( )+[a-z0-9/?]+( )+[0-9][0-9:]+(
  )+.+)
args: []
flags: []
rules:
- condition:
    heuristics:
    - no_ignored_input
  update:
    input_type: ''
- condition:
    flags:
    - -f
  update:
    output_type: (UID( )+PID( )+PPID( )+C( )+STIME( )+TTY( )+TIME( )+CMD)|(([0-9a-zA-Z_]+|-)(
      )+[0-9]+( )+[0-9]+( )+[0-9]+( )+[0-9]+( )+[a-z0-9/?]+( )+[0-9][0-9:]+( )+.+)
isInteresting: true
