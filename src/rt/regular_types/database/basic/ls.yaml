input: ''
output: '.+'
when:
  - opts: ['-l', '-s']
    output: '(total [0-9]+)|([0-9]+ [drwxr-]+ +[0-9]+ +[^ ]+ +[^ ]+ +[0-9]+ +[^ ]+ +[0-9]+ +[a-zA-Z]+ +[0-9]+ + [0-9:]+ +.+)'
  - opts: ['-l']
    output: '(total [0-9]+)|([drwxr-]+ +[0-9]+ +[^ ]+ +[^ ]+ +[0-9]+ +[^ ]+ +[0-9]+ +[a-zA-Z]+ +[0-9]+ + [0-9:]+ +.+)'
  - opts: ['-s']
    output: '(total [0-9]+)|([0-9]+ .+)'
